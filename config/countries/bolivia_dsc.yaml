country: "bolivia_dsc"

paths:
  excel_file: "data/bolivia_dsc/input/blocks.xlsx"
  kml_dir: "data/bolivia_dsc/kml"
  output_maps_dir: "data/bolivia_dsc/output/maps"
  output_pdfs_dir: "data/bolivia_dsc/output/pdfs"
  preview_maps_dir: "data/bolivia_dsc/preview/maps"
  preview_pdfs_dir: "data/bolivia_dsc/preview/pdfs"
  cache_maps_dir: "cache/bolivia_dsc/maps"
  cache_pdfs_dir: "cache/bolivia_dsc/pdfs"
  cache_metadata_dir: "cache/bolivia_dsc/metadata"

dataset:
  id_column: "BlockId!"
  required_columns:
    - "BlockId!"
    - "Country"
    - "Province!"
    - "City!"
  normalize_columns: true
  strip_whitespace: true
  drop_empty_block_ids: true

aggregation:
  group_by: ["BlockId!"]
  rules:
    BlockId!: "first"
    Country: "unique_join_comma"
    Province!: "unique_join_comma"
    City!: "unique_join_comma"

table_fields:
  - source: "BlockId!"
    label: "BLOCK_ID"
  - source: "Country"
    label: "País"
  - source: "Province!"
    label: "Departamento / Estado"
  - source: "City!"
    label: "Ciudad"

map:
  style: "osm-bright"
  width: 1280
  height: 900
  scale_factor: 1
  zoom: null
  fit_to_geometry: true
  margin_ratio: 0.12
  zoom_offset: 0
  geometry_simplify_tolerance: 0.00002
  marker_enabled: false
  attribution_enabled: true
  polygon:
    stroke_color: "#FF0000"
    stroke_width: 3
    fill_color: "#FF0000"
    fill_opacity: 0.15