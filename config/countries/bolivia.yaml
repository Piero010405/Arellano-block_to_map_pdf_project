country: "bolivia"

paths:
  excel_file: "data/bolivia/input/blocks.xlsx"
  kml_dir: "data/bolivia/kml"
  output_maps_dir: "data/bolivia/output/maps"
  output_pdfs_dir: "data/bolivia/output/pdfs"
  preview_maps_dir: "data/bolivia/preview/maps"
  preview_pdfs_dir: "data/bolivia/preview/pdfs"
  cache_maps_dir: "cache/bolivia/maps"
  cache_pdfs_dir: "cache/bolivia/pdfs"
  cache_metadata_dir: "cache/bolivia/metadata"

map:
  style: "osm-bright"
  width: 1280
  height: 900
  scale_factor: 1
  zoom: null
  fit_to_geometry: true
  margin_ratio: 0.15
  geometry_simplify_tolerance: 0.00002
  marker_enabled: false
  attribution_enabled: true
  polygon:
    stroke_color: "#FF0000"
    stroke_width: 3
    fill_color: "#FF0000"
    fill_opacity: 0.15
